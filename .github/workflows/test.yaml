name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - name: Set up Node.js
      uses: actions/setup-node@v6
    - name: Set up Python
      uses: actions/setup-python@v6
    - name: Run import_and_patch_translators
      run: python3 scripts/import_and_patch_translators.py
    - name: Install dependencies
      run: npm ci
    - name: Verify linkedom bundle consistency
      run: |
        npm run bundle-linkedom
        if [ -n "$(git status --porcelain sources/vendor/linkedom.js)" ]; then
          echo "Error: sources/vendor/linkedom.js is out of date or has manual changes."
          echo "Please run 'npm run bundle-linkedom' and commit the changes."
          git diff sources/vendor/linkedom.js
          exit 1
        fi
    - name: Run tests
      run: npm test

  bridge-smoke:
    name: Bridge smoke (JVM mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: jbangdev/setup-jbang@main
      - name: JBang build (JVM, no native-image)
        working-directory: bridge
        shell: bash
        run: |
          mkdir -p build
          jbang export portable --force -O build/jabext-experimental.jar JabExtBridge.java
      - name: Smoke /v1/health
        working-directory: bridge
        shell: bash
        run: |
          mkfifo keepalive.fifo
          ( tail -f /dev/null > keepalive.fifo & )
          java -jar build/jabext-experimental.jar < keepalive.fifo > stdout.log 2> stderr.log &
          BRIDGE_PID=$!
          sleep 3
          cat stderr.log
          PORT=$(grep -oP 'listening on 127\.0\.0\.1:\K\d+' stderr.log)
          if [ -z "$PORT" ]; then
            echo "bridge failed to start" >&2
            exit 1
          fi
          BODY=$(curl -s "http://127.0.0.1:$PORT/v1/health")
          echo "health: $BODY"
          echo "$BODY" | grep -q '"ok":true' || { echo "health failed" >&2; exit 1; }
          kill $BRIDGE_PID || true
